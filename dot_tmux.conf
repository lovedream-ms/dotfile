# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1

# # renumber windows sequentially after closing any of them
# set -g renumber-windows on

# # soften status bar color from harsh green to light gray
# set -g status-style bg='#666666',fg='#aaaaaa'

# # remove administrative debris (session name, hostname, time) in status bar
# set -g status-left ''
# set -g status-right ''

# # increase scrollback lines
# set -g history-limit 10000

# # prefix -> back-one-character
# bind-key C-b send-prefix
# # prefix-2 -> forward-incremental-history-search
# bind-key C-s send-prefix -2

# # don't suspend-client
# unbind-key C-z
set -s set-clipboard on
set -g mouse on # 开启鼠标支持
set -g pane-border-status off

##### remap prefix from C-b to C-Space ########################
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
##### remap prefix from C-b to C-Space ########################

##### split window and keep current path ################## 
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
##### split window and keep current path ##################

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_status_modules_right "application session date_time"

set -g @plugin 'tmux-plugins/tmux-resurrect' # 一键恢复所有的会话窗口面板布局
set -g @plugin 'tmux-plugins/tmux-continuum' # 每 15 分钟自动保存
set -g @continuum-restore 'on' # 启用自动恢复

set -g @plugin 'omerxx/tmux-sessionx'

set -g @plugin 'alexwforsythe/tmux-which-key' # 快捷键推荐 Prefix 停顿一秒提醒

run '~/.tmux/plugins/tpm/tpm'
